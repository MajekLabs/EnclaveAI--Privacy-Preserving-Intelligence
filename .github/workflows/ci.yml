name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Build & Test Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build contracts (wasm)
        run: |
          cargo build --release --target wasm32v1-none \
            --package auranode-pool \
            --package auranode-verifier \
            --package enclaveai-contract

      - name: Run contract tests
        run: |
          cargo test \
            --package auranode-pool \
            --package auranode-verifier \
            --package enclaveai-contract

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Type check & build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_POOL_CONTRACT_ID: CDGW4Y626MRU3MSXH4HUKEQWIQS6UAKAOTZCE7PR7OVAUK5J7UDRFLXB
          NEXT_PUBLIC_VERIFIER_CONTRACT_ID: CDT4P3FKFLT7K7R6S3VVDXTTDE4SKOOFN4C4LIU7TI37U7LSRX4TRJBS
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org

  node-daemon:
    name: Build Node Daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-daemon-${{ hashFiles('**/Cargo.lock') }}

      - name: Build node-daemon
        run: cargo build --package node-daemon
